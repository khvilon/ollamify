services:
  ssl-init:
    image: alpine:3.20
    container_name: ssl-init
    environment:
      - DOMAIN=${DOMAIN:-localhost}
    volumes:
      - ./nginx/ssl:/etc/nginx/ssl
    command: >
      sh -c '
        set -e;
        if [ -f /etc/nginx/ssl/cert.pem ] && [ -f /etc/nginx/ssl/privkey.pem ]; then
          echo "[ssl-init] SSL files already exist, skipping.";
          exit 0;
        fi;
        echo "[ssl-init] Generating self-signed TLS cert for ${DOMAIN:-localhost} ...";
        apk add --no-cache openssl >/dev/null;
        mkdir -p /etc/nginx/ssl;
        openssl req -x509 -nodes -newkey rsa:2048 -days 3650 \
          -keyout /etc/nginx/ssl/privkey.pem \
          -out /etc/nginx/ssl/cert.pem \
          -subj "/CN=${DOMAIN:-localhost}" \
          -addext "subjectAltName=DNS:${DOMAIN:-localhost},DNS:localhost,IP:127.0.0.1";
        chmod 600 /etc/nginx/ssl/privkey.pem || true;
        chmod 644 /etc/nginx/ssl/cert.pem || true;
        echo "[ssl-init] Done.";
      '
    restart: "no"
    networks:
      - app-network

  zeus:
    build:
      context: .
      dockerfile: services/zeus/Dockerfile
    volumes:
      - ./.env:/app/.env
      - ./services/zeus/src:/app/src
    depends_on:
      db:
        condition: service_healthy
      vector-db:
        condition: service_started
      ollama:
        condition: service_healthy
      reranker:
        condition: service_started
      frida:
        condition: service_started
      tts-realtime:
        condition: service_started
      stt:
        condition: service_started
    environment:
      - ZEUS_PORT=80
      - POSTGRES_PORT=${POSTGRES_PORT}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_HOST=db
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - OPENROUTER_URL=${OPENROUTER_URL}
      - QDRANT_HOST=vector-db
      - QDRANT_PORT=6333
      - TTS_SERVICE_URL=http://tts-realtime:8006
      - VLLM_MANAGER_URL=${VLLM_MANAGER_URL:-http://vllm-manager:8007}
      - OLLAMIFY_OLLAMA_MAX_ACTIVE_PER_INSTANCE=${OLLAMIFY_OLLAMA_MAX_ACTIVE_PER_INSTANCE:-1}
      - OLLAMIFY_OLLAMA_MAX_QUEUE_PER_INSTANCE=${OLLAMIFY_OLLAMA_MAX_QUEUE_PER_INSTANCE:-32}
      - OLLAMIFY_OLLAMA_QUEUE_TIMEOUT_MS=${OLLAMIFY_OLLAMA_QUEUE_TIMEOUT_MS:-60000}
      - OLLAMIFY_VLLM_MAX_ACTIVE=${OLLAMIFY_VLLM_MAX_ACTIVE:-64}
      - OLLAMIFY_VLLM_MAX_QUEUE=${OLLAMIFY_VLLM_MAX_QUEUE:-128}
      - OLLAMIFY_VLLM_QUEUE_TIMEOUT_MS=${OLLAMIFY_VLLM_QUEUE_TIMEOUT_MS:-30000}
    expose:
      - "80"
    container_name: zeus
    networks:
      - app-network

  db:
    image: ankane/pgvector:latest
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./services/vector-db/init.sql:/docker-entrypoint-initdb.d/init.sql
    ## for debug purposes only
    #ports:
    #  - "${POSTGRES_PORT:-5432}:5432"
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    container_name: db
    networks:
      - app-network

  vector-db:
    build:
      context: ./services/vector-db
      dockerfile: Dockerfile
    volumes:
      - qdrant_data:/qdrant/storage
      - ./services/vector-db/config.yaml:/qdrant/config/production.yaml
    expose:
      - "6333"
      - "6334"
    container_name: vector-db
    networks:
      - app-network

  frida:
    build:
      context: ./services/frida
      dockerfile: Dockerfile
    volumes:
      - frida_models:/app/models
    expose:
      - "8002"
    container_name: frida
    networks:
      - app-network

  reranker:
    build:
      context: ./services/reranker
      dockerfile: Dockerfile
    volumes:
      - reranker_models:/app/models
      - ./services/reranker/app.py:/app/app.py
    expose:
      - "8001"
    environment:
      - RERANKER_MODEL=${RERANKER_MODEL}
      - PORT=8001
      - TRANSFORMERS_CACHE=/app/models
      - HF_HUB_ENABLE_HF_TRANSFER=0
    container_name: reranker
    networks:
      - app-network

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    environment:
      - OLLAMA_NUM_PARALLEL=${OLLAMA_NUM_PARALLEL:-1}
      - OLLAMA_MAX_QUEUE=${OLLAMA_MAX_QUEUE:-16}
    expose:
      - "11434"
    healthcheck:
      test:
        - CMD
        - pgrep
        - ollama
      timeout: 5s
      interval: 5s
      retries: 3
      start_period: 10s
    networks:
      app-network: null
    volumes:
      - type: volume
        source: ollama_data
        target: /root/.ollama
        volume: {}

  auth:
    container_name: auth
    build: ./services/auth
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      JWT_SECRET: ${JWT_SECRET}
      AUTH_PORT: 80
    expose:
      - "80"
    depends_on:
      - db
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      restart_policy:
        condition: on-failure
        max_attempts: 3

  www3:
    build:
      context: ./services/www3
      dockerfile: Dockerfile
    ports:
      - "${WWW_PORT_HTTP:-80}:80"
      - "${WWW_PORT_HTTPS:-443}:443"
    depends_on:
      ssl-init:
        condition: service_completed_successfully
      zeus:
        condition: service_started
      auth:
        condition: service_started
    volumes:
      - ./services/www3:/usr/share/nginx/html
      - ./services/www3/nginx.conf:/etc/nginx/conf.d/default.conf
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./nginx/acme:/var/www/acme
    container_name: www3
    networks:
      - app-network

  tts-realtime:
    build:
      context: ./services/tts-realtime
      dockerfile: Dockerfile
    volumes:
      - tts_hf_cache:/root/.cache/huggingface
    expose:
      - "8006"
    environment:
      - PORT=8006
      - HF_HOME=/root/.cache/huggingface
      - TTS_PRELOAD_ON_STARTUP=1
    container_name: tts-realtime
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8006/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  stt:
    build:
      context: ./services/stt
      dockerfile: Dockerfile
    volumes:
      - stt_models:/app/models
    expose:
      - "8004"
    environment:
      - PORT=8004
      - WHISPER_CACHE=/app/models
      - TORCH_HOME=/app/models
      - HF_HOME=/app/models
    container_name: stt
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8004/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s

  playwright:
    build:
      context: .
      dockerfile: Dockerfile.playwright
    depends_on:
      - www3
    network_mode: "service:www3"
    environment:
      - HOME=/root
      - DEBUG=pw:browser*
    entrypoint: ["sleep", "infinity"]
    restart: unless-stopped
    shm_size: 2gb

volumes:
  pg_data:
  qdrant_data:
  ollama_data:
  frida_models:
  reranker_models:
    name: ollamify-reranker-models
  stt_models:
    name: ollamify-stt-models
  tts_hf_cache:
    name: ollamify-tts-hf-cache

networks:
  app-network:
    driver: bridge
    name: app-network
