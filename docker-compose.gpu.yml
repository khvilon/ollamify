services:

  zeus:
    build:
      context: .
      dockerfile: services/zeus/Dockerfile
    volumes:
      - ./.env:/app/.env
      - ./services/zeus/src:/app/src
    depends_on:
      db:
        condition: service_healthy
      vector-db:
        condition: service_started
      ollama:
        condition: service_healthy
      reranker:
        condition: service_started
      frida:
        condition: service_started
      tts-realtime:
        condition: service_started
      stt:
        condition: service_started
      vllm-manager:
        condition: service_started
    environment:
      - ZEUS_PORT=80
      - POSTGRES_PORT=${POSTGRES_PORT}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_HOST=db
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - OPENROUTER_URL=${OPENROUTER_URL}
      - QDRANT_HOST=vector-db
      - QDRANT_PORT=6333
      - TTS_SERVICE_URL=http://tts-realtime:8006
      - VLLM_MANAGER_URL=http://vllm-manager:8007
      - OLLAMIFY_OLLAMA_MAX_ACTIVE_PER_INSTANCE=${OLLAMIFY_OLLAMA_MAX_ACTIVE_PER_INSTANCE:-1}
      - OLLAMIFY_OLLAMA_MAX_QUEUE_PER_INSTANCE=${OLLAMIFY_OLLAMA_MAX_QUEUE_PER_INSTANCE:-32}
      - OLLAMIFY_OLLAMA_QUEUE_TIMEOUT_MS=${OLLAMIFY_OLLAMA_QUEUE_TIMEOUT_MS:-60000}
      - OLLAMIFY_VLLM_MAX_ACTIVE=${OLLAMIFY_VLLM_MAX_ACTIVE:-64}
      - OLLAMIFY_VLLM_MAX_QUEUE=${OLLAMIFY_VLLM_MAX_QUEUE:-128}
      - OLLAMIFY_VLLM_QUEUE_TIMEOUT_MS=${OLLAMIFY_VLLM_QUEUE_TIMEOUT_MS:-30000}
    expose:
      - "80"
    container_name: zeus
    networks:
      - app-network

  ollama:
    environment:
      # Bind primary Ollama instance to GPU 0
      - NVIDIA_VISIBLE_DEVICES=0
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["0"]
              capabilities: [gpu]

  frida:
    environment:
      - TRANSFORMERS_CACHE=/app/models
      - NVIDIA_VISIBLE_DEVICES=all
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  reranker:
    build:
      context: ./services/reranker
      dockerfile: Dockerfile.gpu
    environment:
      - RERANKER_MODEL=${RERANKER_MODEL}
      - PORT=8001
      - TRANSFORMERS_CACHE=/app/models
      - HF_HUB_ENABLE_HF_TRANSFER=0
      - NVIDIA_VISIBLE_DEVICES=all
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  stt:
    build:
      context: ./services/stt
      dockerfile: Dockerfile.gpu
    volumes:
      - stt_models:/app/models
    expose:
      - "8004"
    environment:
      - PORT=8004
      - WHISPER_CACHE=/app/models
      - TORCH_HOME=/app/models
      - HF_HOME=/app/models
      - NVIDIA_VISIBLE_DEVICES=all
    container_name: stt
    networks:
      - app-network
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8004/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s

  tts-realtime:
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - MOSS_DEVICE=cuda
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  gpu-info:
    build:
      context: .
      dockerfile: services/gpu-info/Dockerfile
    environment:
      - PORT=8005
      - NVIDIA_VISIBLE_DEVICES=all
    expose:
      - "8005"
    container_name: gpu-info
    restart: unless-stopped
    networks:
      - app-network
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8005/health').read()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  vllm-manager:
    build:
      context: ./services/vllm
      dockerfile: Dockerfile
    volumes:
      - vllm_hf_cache:/root/.cache/huggingface
      - ollama_data:/root/.ollama:ro
    expose:
      - "8007"
    environment:
      - PORT=8007
      - VLLM_INNER_HOST=127.0.0.1
      - VLLM_INNER_PORT=8008
      - VLLM_MODEL=${VLLM_MODEL:-}
      - VLLM_DEFAULT_ARGS=${VLLM_DEFAULT_ARGS:---dtype auto --gpu-memory-utilization 0.55}
      - VLLM_EXTRA_ARGS=${VLLM_EXTRA_ARGS:-}
      - VLLM_MODEL_ALIASES=${VLLM_MODEL_ALIASES:-}
      - VLLM_LOAD_TIMEOUT_SECONDS=${VLLM_LOAD_TIMEOUT_SECONDS:-1800}
      - VLLM_PROXY_TIMEOUT_SECONDS=${VLLM_PROXY_TIMEOUT_SECONDS:-0}
      - VLLM_REQUIRE_GPU=${VLLM_REQUIRE_GPU:-1}
      - VLLM_UNLOAD_OLLAMA_MODEL=${VLLM_UNLOAD_OLLAMA_MODEL:-1}
      - VLLM_USE_V2_MODEL_RUNNER=${VLLM_USE_V2_MODEL_RUNNER:-0}
      - OLLAMA_URL=http://ollama:11434
      - HF_HOME=/root/.cache/huggingface
      - HUGGING_FACE_HUB_TOKEN=${HUGGING_FACE_HUB_TOKEN:-}
      - NVIDIA_VISIBLE_DEVICES=${VLLM_NVIDIA_VISIBLE_DEVICES:-all}
    container_name: vllm-manager
    init: true
    restart: unless-stopped
    networks:
      - app-network
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8007/health').read()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  stt_models:
    name: ollamify-stt-models
  vllm_hf_cache:
    name: ollamify-vllm-hf-cache
